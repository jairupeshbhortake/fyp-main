version: "3.9"

services:
  backend:
    build: ./backend
    container_name: dronevault-backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
      - dronevault-data:/data
    environment:
      - DATABASE_URL=sqlite:////data/dronevault.db
      - SECRET_KEY=${SECRET_KEY:-dev-secret-key-change-in-prod}
      - ALGORITHM=HS256
      - ACCESS_TOKEN_EXPIRE_MINUTES=1440
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  frontend:
    build:
      context: ./frontend
      target: dev
    container_name: dronevault-frontend
    restart: unless-stopped
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      - VITE_API_BASE_URL=http://localhost:8000
    depends_on:
      - backend
    command: npm run dev -- --host 0.0.0.0

volumes:
  dronevault-data:
