version: "3.9"

services:
  backend:
    image: ghcr.io/${GITHUB_REPOSITORY}-backend:${IMAGE_TAG:-latest}
    container_name: dronevault-backend
    restart: always
    expose:
      - "8000"
    volumes:
      - dronevault-data:/data
    environment:
      - DATABASE_URL=sqlite:////data/dronevault.db
      - SECRET_KEY=${SECRET_KEY}
      - ALGORITHM=HS256
      - ACCESS_TOKEN_EXPIRE_MINUTES=1440
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --workers 2

  frontend:
    image: ghcr.io/${GITHUB_REPOSITORY}-frontend:${IMAGE_TAG:-latest}
    container_name: dronevault-frontend
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./ssl:/etc/nginx/ssl:ro
    depends_on:
      - backend

  # Optional: swap SQLite for PostgreSQL in production
  # db:
  #   image: postgres:16-alpine
  #   restart: always
  #   environment:
  #     POSTGRES_DB: dronevault
  #     POSTGRES_USER: dronevault
  #     POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
  #   volumes:
  #     - postgres-data:/var/lib/postgresql/data

volumes:
  dronevault-data:
  # postgres-data:
